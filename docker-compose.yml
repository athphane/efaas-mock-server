services:
  efaas:
    build: .
    container_name: efaas
    hostname: efaas
    networks:
      efaas-net:
        ipv4_address: 172.25.0.10
    ports:
      - "5000:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - SERVER_URL=http://localhost:5000
      - SEED_COUNT=100

networks:
  efaas-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
