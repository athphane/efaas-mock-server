services:
  efaas:
    build: .
    container_name: efaas
    hostname: efaas
    ports:
      - "5000:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - SERVER_URL=http://172.28.0.10:5000
      - SEED_COUNT=100
    networks:
      efaas-net:
        ipv4_address: 172.28.0.10

networks:
  efaas-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
